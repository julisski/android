# Continuous Integration.
#
# GitHub runs this automatically on every push to `main` and on every pull
# request. There are TWO jobs, each fanned out over every project (one parallel
# matrix job per project, fail-fast: false so one failure never hides the rest):
#
#   • build      — ./gradlew assembleDebug      (full debug APK: Kotlin + resources
#                                                + manifest merge + dex + packaging)
#   • unit-test  — ./gradlew testDebugUnitTest  (the JVM unit tests under src/test)
#
# assembleDebug is a strict upgrade over a plain compile check: it catches
# resource and manifest errors that compiling Kotlin alone would miss.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:        # also lets you trigger it by hand from the Actions tab

permissions:
  contents: read

# If you push twice quickly, cancel the older in-progress run for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # JOB 1 — build a full debug APK for every project.
  # ===========================================================================
  build:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # build every project even if one fails, so you see all results
      matrix:
        include:
          # Most projects build from their own folder...
          - { name: SingleActivity,    dir: SingleActivity }
          - { name: Intent,            dir: Intent }
          - { name: NavDetailList,     dir: NavDetailList }
          # ...NavListDetail's buildable project lives in its app/ subfolder
          # (its outer folder has an incomplete version catalog).
          - { name: NavListDetail,     dir: NavListDetail/app }
          - { name: NavThreeScreen,    dir: NavThreeScreen }
          - { name: NavFourScreen,     dir: NavFourScreen }
          - { name: NavDeepLinks,      dir: NavDeepLinks }
          - { name: NavBottomTabs,     dir: NavBottomTabs }
          - { name: NavNestedGraphs,   dir: NavNestedGraphs }
          - { name: NavViewModelState, dir: NavViewModelState }
          - { name: NavTransitions,    dir: NavTransitions }
          - { name: NavDataLayer,      dir: NavDataLayer }
          # --- Android concept demos (notes domain) ---
          - { name: ComposeModernUI,    dir: ComposeModernUI }
          - { name: ComposeLists,       dir: ComposeLists }
          - { name: NetworkParsing,     dir: NetworkParsing }
          - { name: MvvmState,          dir: MvvmState }
          - { name: RoomAndPreferences, dir: RoomAndPreferences }
          - { name: AppReleaseBasics,   dir: AppReleaseBasics }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21 — every project's gradle-daemon-jvm.properties pins toolchainVersion=21.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Android SDK / command-line tools so AGP can fetch the compileSdk platform.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Gradle with dependency/wrapper caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build the debug APK. assembleDebug also compiles Kotlin, so this fully
      # supersedes the old compileDebugKotlin check.
      - name: Assemble debug APK
        working-directory: ${{ matrix.dir }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --console=plain --stacktrace

      # Keep the built APK as a downloadable artifact on the run's summary page.
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-debug-apk
          path: ${{ matrix.dir }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  # ===========================================================================
  # JOB 2 — run the JVM unit tests (src/test) for every project.
  # Projects without any test sources simply pass (the task is a no-op).
  # ===========================================================================
  unit-test:
    name: test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: SingleActivity,    dir: SingleActivity }
          - { name: Intent,            dir: Intent }
          - { name: NavDetailList,     dir: NavDetailList }
          - { name: NavListDetail,     dir: NavListDetail/app }
          - { name: NavThreeScreen,    dir: NavThreeScreen }
          - { name: NavFourScreen,     dir: NavFourScreen }
          - { name: NavDeepLinks,      dir: NavDeepLinks }
          - { name: NavBottomTabs,     dir: NavBottomTabs }
          - { name: NavNestedGraphs,   dir: NavNestedGraphs }
          - { name: NavViewModelState, dir: NavViewModelState }
          - { name: NavTransitions,    dir: NavTransitions }
          - { name: NavDataLayer,      dir: NavDataLayer }
          # --- Android concept demos (notes domain) ---
          - { name: ComposeModernUI,    dir: ComposeModernUI }
          - { name: ComposeLists,       dir: ComposeLists }
          - { name: NetworkParsing,     dir: NetworkParsing }
          - { name: MvvmState,          dir: MvvmState }
          - { name: RoomAndPreferences, dir: RoomAndPreferences }
          - { name: AppReleaseBasics,   dir: AppReleaseBasics }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM unit tests
        working-directory: ${{ matrix.dir }}
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --console=plain --stacktrace

      # Always publish the HTML test report (even when a test fails) so you can
      # open it from the run summary to see exactly what broke.
      - name: Upload test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-test-report
          path: ${{ matrix.dir }}/**/build/reports/tests/
          if-no-files-found: ignore
